product:
  name: "feedme"
  description: "URL에서 콘텐츠를 마크다운으로 추출하여 AI 챗봇에 붙여넣을 수 있는 미니멀 웹 도구"

features:
  - id: feedme-extract
    title: "콘텐츠 추출"
    scenarios:
      - id: FEEDME-001
        given: "URL 입력창이 비어 있는 초기 화면"
        when: "URL 입력란에 웹페이지 URL을 입력하고 '추출' 버튼을 클릭한다"
        then: "제목과 본문이 렌더링된 마크다운 미리보기로 표시된다"
        examples:
          - input: { url: "https://example.com/article" }
            expect: { previewVisible: true, previewContainsTitle: true, previewContainsBody: true }
      - id: FEEDME-002
        given: "URL 입력창이 비어 있는 초기 화면"
        when: "URL 입력란에 YouTube URL을 입력하고 '추출' 버튼을 클릭한다"
        then: "영상 제목, 채널명, 설명, 자막이 렌더링된 마크다운 미리보기로 표시된다"
        examples:
          - input: { url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
            expect: { previewVisible: true, previewContainsTitle: true, previewContainsChannel: true, previewContainsTranscript: true }
      - id: FEEDME-003
        given: "유효한 URL을 입력하고 '가져오기' 버튼을 클릭한 직후"
        when: "서버에서 콘텐츠를 가져오는 동안"
        then: "버튼에 스피너 아이콘만 표시되고 버튼이 disabled된다"
        examples:
          - input: { url: "https://example.com/article" }
            expect: { buttonSpinner: true, buttonDisabled: true, buttonTextVisible: false, separateLoadingArea: false }
    excludes:
      - "콘텐츠 편집 기능 — 설계 원칙 '편집 없이 바로 복사'"
      - "추출 히스토리 저장 — MVP 범위 외"

  - id: feedme-copy
    title: "클립보드 복사"
    scenarios:
      - id: FEEDME-004
        given: "콘텐츠가 추출되지 않은 초기 화면"
        when: "화면을 확인한다"
        then: "'복사' 버튼이 표시되지 않는다"
        examples:
          - input: { state: "initial" }
            expect: { copyButtonVisible: false }
      - id: FEEDME-005
        given: "콘텐츠가 추출되어 마크다운 미리보기가 표시된 상태"
        when: "'복사' 버튼을 클릭한다"
        then: "마크다운 원문이 클립보드에 복사되고 '복사됨' 토스트 메시지가 표시된다"
        examples:
          - input: { action: "clickCopyButton" }
            expect: { clipboardHasContent: true, toastMessage: "복사됨" }
    excludes:
      - "챗봇별 맞춤 형식 — 설계 원칙 '챗봇 비종속'"

  - id: feedme-error
    title: "에러 처리"
    scenarios:
      - id: FEEDME-006
        given: "URL 입력란이 비어 있는 상태"
        when: "화면을 확인한다"
        then: "'가져오기' 버튼이 disabled 상태로 표시된다"
        examples:
          - input: { url: "" }
            expect: { buttonDisabled: true }
      - id: FEEDME-007
        given: "URL 입력란에 잘못된 형식의 텍스트가 입력된 상태"
        when: "화면을 확인한다"
        then: "'가져오기' 버튼이 disabled 상태로 표시된다"
        examples:
          - input: { url: "not-a-url" }
            expect: { buttonDisabled: true }
      - id: FEEDME-008
        given: "URL 입력란에 접근 불가능한 URL이 입력된 상태"
        when: "'가져오기' 버튼을 클릭한다"
        then: "입력 필드 하단에 '페이지에 접근할 수 없습니다' 인라인 에러 텍스트가 빨간색으로 표시된다"
        examples:
          - input: { url: "https://unreachable.invalid" }
            expect: { inlineErrorText: "페이지에 접근할 수 없습니다", alertComponentVisible: false }
      - id: FEEDME-009
        given: "자막이 없는 YouTube 영상의 URL이 입력된 상태"
        when: "'가져오기' 버튼을 클릭한다"
        then: "입력 필드 하단에 '자막을 찾을 수 없습니다' 인라인 에러 텍스트가 빨간색으로 표시된다"
        examples:
          - input: { url: "https://www.youtube.com/watch?v=no-captions" }
            expect: { inlineErrorText: "자막을 찾을 수 없습니다", alertComponentVisible: false }
      - id: FEEDME-011
        given: "네트워크 연결 오류 또는 서버 응답 없음 상태에서 유효한 URL이 입력된 상태"
        when: "'가져오기' 버튼을 클릭한다"
        then: "입력 필드 하단에 '네트워크 오류가 발생했습니다' 인라인 에러 텍스트가 빨간색으로 표시된다"
        examples:
          - input: { url: "https://example.com/article", networkOffline: true }
            expect: { inlineErrorText: "네트워크 오류가 발생했습니다", alertComponentVisible: false }
      - id: FEEDME-012
        given: "URL 입력란에 잘못된 형식의 텍스트가 입력되어 버튼이 비활성화된 상태"
        when: "유효한 URL('https://example.com')로 수정한다"
        then: "'가져오기' 버튼이 활성화된다"
        examples:
          - input: { initialUrl: "not-a-url", updatedUrl: "https://example.com" }
            expect: { buttonDisabled: false }
      - id: FEEDME-010
        given: "서버 에러로 인라인 에러 텍스트가 표시된 상태"
        when: "사용자가 URL 입력란을 수정한다"
        then: "인라인 에러 텍스트가 즉시 사라진다"
        examples:
          - input: { currentError: "페이지에 접근할 수 없습니다", userTypesInInput: true }
            expect: { inlineErrorText: null }
